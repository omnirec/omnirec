<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About OmniRec</title>
    <link rel="stylesheet" href="./about.css" />
    <script type="module" src="./about.ts" defer></script>
  </head>
  <body>
    <div class="about-container" data-tauri-drag-region>
      <button class="close-btn" id="close-btn" title="Close">&times;</button>
      <div class="about-header" data-tauri-drag-region></div>
      <div class="about-content" data-tauri-drag-region>

        <img src="/src/assets/omnirec-logo-transparent-dark.png" alt="OmniRec" class="about-logo" />

        <p class="about-version" id="about-version">Version loading...</p>

        <p class="about-description">
          High-performance screen, window, and region recording.
        </p>

        <div class="about-links">
          <a href="#" id="about-website-link" class="about-link">
            <svg class="about-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            Website
          </a>
          <a href="#" id="about-github-link" class="about-link">
            <svg class="about-link-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            GitHub
          </a>
        </div>

        <div class="about-update-section">
          <button class="about-update-btn" id="check-updates-btn">Check for Updates</button>
          <div class="about-update-status" id="update-status" style="display:none">
            <span class="about-update-checking" id="update-checking" style="display:none">Checking...</span>
            <span class="about-update-current" id="update-current" style="display:none">You're up to date.</span>
            <span class="about-update-error" id="update-error" style="display:none"></span>
            <div class="about-update-available" id="update-available" style="display:none">
              <p class="about-update-version" id="update-version"></p>
              <p class="about-update-notes" id="update-notes"></p>
              <div class="about-update-progress-wrap" id="update-progress-wrap" style="display:none">
                <progress class="about-update-progress" id="update-progress" value="0" max="100"></progress>
                <span class="about-update-progress-label" id="update-progress-label">0%</span>
              </div>
              <button class="about-update-install-btn" id="install-update-btn">Install &amp; Relaunch</button>
            </div>
          </div>
        </div>

        <div class="about-legal">
          <p class="about-copyright">Copyright 2024-2026 Keath Milligan</p>
          <p class="about-license">
            Released under the <a href="#" id="about-license-link">MIT License</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
